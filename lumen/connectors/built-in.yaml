# Built-in connectors — ship with every Neo installation
- name: message
  description: "Send and receive messages"
  actions: [send, receive]

- name: memory
  description: "Read, write, and search persistent memory"
  actions: [read, write, search]

- name: web
  description: "Search the web and extract content from URLs"
  actions: [search, extract]

- name: file
  description: "Read, write, and list local files"
  actions: [read, write, list]

- name: task
  description: "Create, list, complete, and delete tasks"
  actions: [create, list, complete, delete]

- name: note
  description: "Create, list, search, and delete notes"
  actions: [create, list, search, delete]
