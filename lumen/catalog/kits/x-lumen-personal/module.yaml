name: x-lumen-personal
type: kit
display_name: "Lumen Personal"
description: "Tu asistente personal de uso general. Ayuda con tareas, notas, búsquedas y lo que necesites."
version: 1.0.0
author: "Lumen Team"
price: free
min_capability: tier-1
tags: [kit, personal]
onboarding_flow: flows/onboarding.yaml
x-lumen:
  mcps:
    bundled:
      - name: fetch
        command: "uvx mcp-fetch"
        purpose: "Acceder a URLs y contenido web"
      - name: filesystem
        command: "uvx mcp-server-filesystem"
        args: ["{{user_home}}"]
        purpose: "Leer y escribir archivos locales"
    advisory: []
