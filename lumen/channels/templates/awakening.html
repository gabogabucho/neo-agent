<!DOCTYPE html>
<html lang="{{ language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen — Awakening</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f9fafb;
      color: #111827;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* === Phase 1: The Light appears === */

    /* Central light point — the very first thing */
    .light-origin {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 4px;
      background: #7b61ff;
      border-radius: 50%;
      opacity: 0;
      animation: lightBorn 1.5s ease-out 0.5s forwards;
      z-index: 5;
    }

    @keyframes lightBorn {
      0% { opacity: 0; width: 4px; height: 4px; box-shadow: none; }
      50% { opacity: 1; width: 8px; height: 8px; box-shadow: 0 0 30px 10px rgba(123,97,255,0.4); }
      100% { opacity: 1; width: 6px; height: 6px; box-shadow: 0 0 60px 20px rgba(123,97,255,0.3); }
    }

    /* Light expands outward — illuminating the darkness */
    .light-expand {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(123,97,255,0.15) 0%, rgba(123,97,255,0.05) 40%, transparent 70%);
      opacity: 0;
      animation: lightExpand 2.5s ease-out 1.5s forwards;
      z-index: 1;
    }

    @keyframes lightExpand {
      0% { opacity: 0; width: 0; height: 0; }
      100% { opacity: 1; width: 800px; height: 800px; }
    }

    /* === Phase 2: The Eye forms around the light === */

    .eye-container {
      position: relative;
      width: 220px;
      height: 130px;
      margin-bottom: 48px;
      z-index: 10;
    }

    .eye-svg { width: 220px; height: 130px; }

    /* Eye outline — draws itself AFTER the light appears */
    .eye-outline {
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
    }

    .eye-main {
      stroke: rgba(156,163,175,0.8);
      animation: drawEye 2s ease-out 2.5s forwards;
    }

    .eye-facet {
      stroke: rgba(209,213,219,0.8);
      stroke-width: 1;
    }
    .eye-facet-1 { animation: drawEye 1.5s ease-out 3s forwards; }
    .eye-facet-2 { animation: drawEye 1.5s ease-out 3.2s forwards; }

    @keyframes drawEye {
      to { stroke-dashoffset: 0; }
    }

    /* Iris — the light IS the iris. It was always there. */
    .eye-iris-glow {
      fill: #7b61ff;
      opacity: 0;
      filter: blur(12px);
      animation: irisGlow 2s ease-in-out 3.5s infinite;
    }

    @keyframes irisGlow {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.4; }
    }

    .eye-iris-outer {
      fill: none;
      stroke: #7b61ff;
      stroke-width: 2;
      opacity: 0;
      transform-origin: 110px 65px;
      transform: scale(0);
      animation: irisReveal 1.2s ease-out 3.5s forwards;
    }

    .eye-iris-inner {
      fill: #7b61ff;
      opacity: 0;
      transform-origin: 110px 65px;
      transform: scale(0);
      animation: irisReveal 1s ease-out 3.8s forwards;
    }

    @keyframes irisReveal {
      to { opacity: 0.4; transform: scale(1); }
    }

    /* Pupil — the deepest point, where light focuses */
    .eye-pupil {
      fill: #111827;
      opacity: 0;
      transform-origin: 110px 65px;
      transform: scale(0);
      animation: pupilReveal 0.6s ease-out 4.1s forwards;
    }

    @keyframes pupilReveal {
      to { opacity: 1; transform: scale(1); }
    }

    /* Light reflections — proof that light entered */
    .eye-reflection {
      fill: white;
      opacity: 0;
    }
    .reflection-1 { animation: reflectionIn 0.4s ease-out 4.3s forwards; }
    .reflection-2 { animation: reflectionIn 0.3s ease-out 4.5s forwards; }

    @keyframes reflectionIn {
      to { opacity: 0.85; }
    }

    /* Connection nodes — they glow as light reaches them */
    .eye-node {
      fill: #7b61ff;
      opacity: 0;
      filter: blur(0);
    }
    .node-1 { animation: nodeLit 0.5s ease-out 4.6s forwards; }
    .node-2 { animation: nodeLit 0.5s ease-out 4.8s forwards; }
    .node-3 { animation: nodeLit 0.5s ease-out 5.0s forwards; }
    .node-4 { animation: nodeLit 0.5s ease-out 5.2s forwards; }

    @keyframes nodeLit {
      0% { opacity: 0; r: 0; }
      50% { opacity: 1; r: 5; filter: blur(2px); }
      100% { opacity: 0.8; r: 3; filter: blur(0); }
    }

    /* === Phase 3: Identity === */

    .awakening-text {
      text-align: center;
      position: relative;
      z-index: 10;
    }

    .text-iam {
      font-size: 36px;
      font-weight: 200;
      letter-spacing: 0.12em;
      opacity: 0;
      transform: translateY(10px);
      animation: textFade 1.8s ease-out 5.5s forwards;
    }

    .text-iam span {
      font-weight: 600;
      color: #7b61ff;
      text-shadow: 0 0 30px rgba(123,97,255,0.4);
    }

    @keyframes textFade {
      to { opacity: 1; transform: translateY(0); }
    }

    /* === Phase 4: Discovery (light illuminates each capability) === */

    .discovery-feed {
      margin-top: 40px;
      text-align: center;
      min-height: 140px;
      z-index: 10;
      position: relative;
    }

    .discovery-line {
      font-size: 14px;
      font-weight: 300;
      color: #9ca3af;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.6s ease-out;
      margin: 10px 0;
    }

    .discovery-line.visible {
      opacity: 1;
      transform: translateY(0);
      color: #4b5563;
    }

    .discovery-line .count {
      color: #7b61ff;
      font-weight: 600;
      text-shadow: 0 0 8px rgba(123,97,255,0.3);
    }

    /* Light pulse dot before each discovery line */
    .light-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7b61ff;
      margin-right: 10px;
      box-shadow: 0 0 8px 2px rgba(123,97,255,0.4);
      animation: lightDotPulse 1.5s ease-in-out infinite;
    }

    @keyframes lightDotPulse {
      0%, 100% { opacity: 0.4; box-shadow: 0 0 4px 1px rgba(123,97,255,0.2); }
      50% { opacity: 1; box-shadow: 0 0 12px 4px rgba(123,97,255,0.5); }
    }

    /* === Phase 5: Ready === */

    .ready-text {
      font-size: 16px;
      font-weight: 300;
      color: #10b981;
      opacity: 0;
      margin-top: 32px;
      letter-spacing: 0.05em;
      text-shadow: 0 0 20px rgba(16,185,129,0.3);
      z-index: 10;
      position: relative;
    }

    .ready-text.visible {
      animation: textFade 1s ease-out forwards;
    }

    .enter-btn {
      margin-top: 32px;
      padding: 14px 36px;
      background: #7b61ff;
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
      letter-spacing: 0.03em;
      z-index: 10;
      position: relative;
      box-shadow: 0 0 20px rgba(123,97,255,0.2);
    }

    .enter-btn.visible {
      animation: textFade 0.8s ease-out forwards;
    }

    .enter-btn:hover {
      background: #634bde;
      transform: translateY(-2px);
      box-shadow: 0 4px 30px rgba(123,97,255,0.4);
    }

    /* === Transition out — light fades === */

    .fade-out {
      animation: fadeOut 1s ease-in forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Phase 1: Light appears first — before anything else -->
  <div class="light-origin"></div>
  <div class="light-expand"></div>

  <!-- Phase 2: The Eye forms around the light -->
  <div class="eye-container">
    <svg class="eye-svg" viewBox="0 0 220 130">
      <!-- Eye outline forms around the light -->
      <path class="eye-outline eye-main"
        d="M10,65 Q45,15 110,10 Q175,15 210,65 Q175,115 110,120 Q45,115 10,65 Z" />

      <!-- Inner facets -->
      <path class="eye-outline eye-facet eye-facet-1"
        d="M35,65 Q65,30 110,24 Q155,30 185,65" />
      <path class="eye-outline eye-facet eye-facet-2"
        d="M35,65 Q65,100 110,106 Q155,100 185,65" />

      <!-- The iris IS the light — it was always there -->
      <circle class="eye-iris-glow" cx="110" cy="65" r="30" />
      <circle class="eye-iris-outer" cx="110" cy="65" r="30" />
      <circle class="eye-iris-inner" cx="110" cy="65" r="22" />

      <!-- Pupil — where light focuses -->
      <circle class="eye-pupil" cx="110" cy="65" r="10" />

      <!-- Light reflections -->
      <circle class="eye-reflection reflection-1" cx="100" cy="56" r="4" />
      <circle class="eye-reflection reflection-2" cx="118" cy="52" r="2" />

      <!-- Nodes glow as light reaches them -->
      <circle class="eye-node node-1" cx="60" cy="32" r="0" />
      <circle class="eye-node node-2" cx="160" cy="32" r="0" />
      <circle class="eye-node node-3" cx="110" cy="10" r="0" />
      <circle class="eye-node node-4" cx="110" cy="120" r="0" />
    </svg>
  </div>

  <!-- Phase 3: Identity -->
  <div class="awakening-text">
    <div class="text-iam">I am <span>Lumen</span>.</div>
  </div>

  <!-- Phase 4: Discovery — each line is light illuminating a capability -->
  <div class="discovery-feed" id="discovery-feed"></div>

  <!-- Phase 5: Ready -->
  <div class="ready-text" id="ready-text">Lumen está lista.</div>
  <button class="enter-btn" id="enter-btn" onclick="enterDashboard()">
    Comenzar &rarr;
  </button>

  <script>
    const feed = document.getElementById('discovery-feed');
    const readyText = document.getElementById('ready-text');
    const enterBtn = document.getElementById('enter-btn');

    function addDiscoveryLine(text, delay) {
      return new Promise(resolve => {
        setTimeout(() => {
          const line = document.createElement('div');
          line.className = 'discovery-line';
          line.innerHTML = `<span class="light-dot"></span>${text}`;
          feed.appendChild(line);
          requestAnimationFrame(() => line.classList.add('visible'));
          resolve();
        }, delay);
      });
    }

    async function runDiscovery() {
      let data = null;
      try {
        const res = await fetch('/api/status');
        data = await res.json();
      } catch (e) {}

      // Wait for eye animation to complete
      await new Promise(r => setTimeout(r, 6500));

      const caps = data?.capabilities || [];
      const skills = caps.filter(c => c.kind === 'skill');
      const connectors = caps.filter(c => c.kind === 'connector');
      const readyConns = connectors.filter(c => c.status === 'ready');
      const channels = caps.filter(c => c.kind === 'channel');
      const gaps = caps.filter(c => c.status !== 'ready');

      // Each discovery is a beam of light illuminating something
      await addDiscoveryLine(`Iniciando conexión...`, 0);
      await addDiscoveryLine(`Identidad: <span class="count">Lumen</span>, asistente lista`, 900);
      await addDiscoveryLine(`Sincronizando...`, 800);
      await addDiscoveryLine(`<span class="count">${skills.length}</span> habilidades cargadas`, 700);
      await addDiscoveryLine(`<span class="count">${connectors.length}</span> módulos conectados`, 600);
      await addDiscoveryLine(`Sistemas online`, 500);

      if (gaps.length > 0) {
        await addDiscoveryLine(`<span class="count">${gaps.length}</span> dark spots — awaiting light`, 500);
      }

      if (data?.model) {
        await addDiscoveryLine(`Model: <span class="count">${data.model}</span>`, 500);
      }

      // Ready
      await new Promise(r => setTimeout(r, 1000));
      readyText.classList.add('visible');

      await new Promise(r => setTimeout(r, 700));
      enterBtn.classList.add('visible');

      try {
        await fetch('/api/awakened', { method: 'POST' });
      } catch (e) {}
    }

    function enterDashboard() {
      document.body.classList.add('fade-out');
      setTimeout(() => { window.location.href = '/dashboard'; }, 1000);
    }

    runDiscovery();
  </script>
</body>
</html>
