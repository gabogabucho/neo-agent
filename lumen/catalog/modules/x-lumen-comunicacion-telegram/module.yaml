name: x-lumen-comunicacion-telegram
display_name: "Telegram"
description: "Canal de comunicación por Telegram para enviar mensajes y recibir updates entrantes de forma autocontenida."
version: 1.0.0
author: "Lumen Team"
price: free
min_capability: tier-1
provides:
  - message.send_telegram
tags: [x-lumen, comunicacion, telegram]
x-lumen:
  runtime:
    env:
      - name: TELEGRAM_BOT_TOKEN
        label: "Token del bot de Telegram"
        hint: "Creá un bot con @BotFather y pegá el token que te devuelve (formato 123456:ABC...)."
        secret: true
      - name: TELEGRAM_DEFAULT_CHAT_ID
        label: "Chat ID por defecto"
        hint: "Escribile a tu bot una vez y abrí https://api.telegram.org/bot<TU_TOKEN>/getUpdates — el chat.id es el número que aparece ahí."
        secret: false
