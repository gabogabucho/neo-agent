<!DOCTYPE html>
<html lang="{{ language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen — Awakening</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #050a18;
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* --- Background glow --- */
    .bg-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
      opacity: 0;
      animation: glowIn 3s ease-out 1s forwards;
    }

    @keyframes glowIn {
      to { opacity: 1; }
    }

    /* --- Eye container --- */
    .eye-container {
      position: relative;
      width: 200px;
      height: 120px;
      margin-bottom: 48px;
    }

    /* --- Eye SVG --- */
    .eye-svg {
      width: 200px;
      height: 120px;
    }

    /* Eye outline — starts as a thin line, opens into eye shape */
    .eye-outline {
      fill: none;
      stroke: #cbd5e1;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawEye 2s ease-out 0.5s forwards;
    }

    @keyframes drawEye {
      to { stroke-dashoffset: 0; }
    }

    /* Iris — scales up from nothing */
    .eye-iris-outer {
      fill: none;
      stroke: #3b82f6;
      stroke-width: 2;
      opacity: 0;
      transform-origin: 100px 60px;
      transform: scale(0);
      animation: irisReveal 1s ease-out 2s forwards;
    }

    .eye-iris-inner {
      fill: #3b82f6;
      opacity: 0;
      transform-origin: 100px 60px;
      transform: scale(0);
      animation: irisReveal 0.8s ease-out 2.3s forwards;
    }

    @keyframes irisReveal {
      to { opacity: 1; transform: scale(1); }
    }

    /* Iris pulse glow */
    .eye-iris-glow {
      fill: #3b82f6;
      opacity: 0;
      filter: blur(8px);
      animation: irisPulse 2s ease-in-out 3s infinite;
    }

    @keyframes irisPulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.5; }
    }

    /* Pupil */
    .eye-pupil {
      fill: #050a18;
      opacity: 0;
      transform-origin: 100px 60px;
      transform: scale(0);
      animation: irisReveal 0.5s ease-out 2.6s forwards;
    }

    /* Light reflection dots */
    .eye-reflection {
      fill: white;
      opacity: 0;
      animation: reflectionIn 0.3s ease-out 3s forwards;
    }

    @keyframes reflectionIn {
      to { opacity: 0.8; }
    }

    /* Connection nodes on the eye facets */
    .eye-node {
      fill: white;
      opacity: 0;
      animation: nodeAppear 0.4s ease-out forwards;
    }

    .eye-node:nth-child(1) { animation-delay: 2.8s; }
    .eye-node:nth-child(2) { animation-delay: 3.0s; }
    .eye-node:nth-child(3) { animation-delay: 3.2s; }
    .eye-node:nth-child(4) { animation-delay: 3.4s; }

    @keyframes nodeAppear {
      0% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1.5); }
      100% { opacity: 0.9; transform: scale(1); }
    }

    /* --- Text elements --- */
    .awakening-text {
      text-align: center;
      position: relative;
      z-index: 10;
    }

    .text-iam {
      font-size: 32px;
      font-weight: 200;
      letter-spacing: 0.1em;
      opacity: 0;
      transform: translateY(10px);
      animation: textFade 1.5s ease-out 3.5s forwards;
    }

    .text-iam span {
      font-weight: 600;
      color: #3b82f6;
    }

    @keyframes textFade {
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- Discovery feed --- */
    .discovery-feed {
      margin-top: 40px;
      text-align: center;
      min-height: 120px;
    }

    .discovery-line {
      font-size: 14px;
      font-weight: 300;
      color: #9ca3af;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.6s ease-out;
      margin: 8px 0;
    }

    .discovery-line.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .discovery-line .count {
      color: #3b82f6;
      font-weight: 600;
    }

    .discovery-line .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3b82f6;
      margin-right: 8px;
      animation: dotPulse 1s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* --- Ready state --- */
    .ready-text {
      font-size: 16px;
      font-weight: 300;
      color: #10b981;
      opacity: 0;
      margin-top: 32px;
      letter-spacing: 0.05em;
    }

    .ready-text.visible {
      animation: textFade 1s ease-out forwards;
    }

    /* --- Enter button --- */
    .enter-btn {
      margin-top: 32px;
      padding: 12px 32px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
      letter-spacing: 0.02em;
    }

    .enter-btn.visible {
      animation: textFade 0.8s ease-out forwards;
    }

    .enter-btn:hover {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(59,130,246,0.3);
    }

    /* --- Transition out --- */
    .fade-out {
      animation: fadeOut 0.8s ease-in forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: scale(1.02); }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <!-- The Eye -->
  <div class="eye-container">
    <svg class="eye-svg" viewBox="0 0 200 120">
      <!-- Eye outline (faceted) -->
      <path class="eye-outline"
        d="M10,60 Q40,15 100,10 Q160,15 190,60 Q160,105 100,110 Q40,105 10,60 Z" />

      <!-- Inner facet lines -->
      <path class="eye-outline" style="animation-delay: 1s; stroke-width: 1; stroke: #475569;"
        d="M30,60 Q60,28 100,22 Q140,28 170,60" />
      <path class="eye-outline" style="animation-delay: 1.2s; stroke-width: 1; stroke: #475569;"
        d="M30,60 Q60,92 100,98 Q140,92 170,60" />

      <!-- Iris glow (blur behind) -->
      <circle class="eye-iris-glow" cx="100" cy="60" r="28" />

      <!-- Iris outer -->
      <circle class="eye-iris-outer" cx="100" cy="60" r="28" />

      <!-- Iris inner pattern (starburst) -->
      <circle class="eye-iris-inner" cx="100" cy="60" r="20" opacity="0.3" />

      <!-- Pupil -->
      <circle class="eye-pupil" cx="100" cy="60" r="10" />

      <!-- Light reflection -->
      <circle class="eye-reflection" cx="90" cy="52" r="4" />
      <circle class="eye-reflection" cx="108" cy="48" r="2" style="animation-delay: 3.1s;" />

      <!-- Connection nodes on facets -->
      <g>
        <circle class="eye-node" cx="55" cy="30" r="3" />
        <circle class="eye-node" cx="145" cy="30" r="3" />
        <circle class="eye-node" cx="100" cy="10" r="3" />
        <circle class="eye-node" cx="100" cy="110" r="3" />
      </g>
    </svg>
  </div>

  <!-- "I am Lumen." -->
  <div class="awakening-text">
    <div class="text-iam">I am <span>Lumen</span>.</div>
  </div>

  <!-- Discovery feed -->
  <div class="discovery-feed" id="discovery-feed"></div>

  <!-- Ready -->
  <div class="ready-text" id="ready-text">Lumen is ready.</div>

  <!-- Enter -->
  <button class="enter-btn" id="enter-btn" onclick="enterDashboard()">
    Enter Dashboard &rarr;
  </button>

  <script>
    const feed = document.getElementById('discovery-feed');
    const readyText = document.getElementById('ready-text');
    const enterBtn = document.getElementById('enter-btn');

    function addDiscoveryLine(text, delay) {
      return new Promise(resolve => {
        setTimeout(() => {
          const line = document.createElement('div');
          line.className = 'discovery-line';
          line.innerHTML = `<span class="status-dot"></span>${text}`;
          feed.appendChild(line);
          requestAnimationFrame(() => line.classList.add('visible'));
          resolve();
        }, delay);
      });
    }

    async function runDiscovery() {
      // Fetch real data from API
      let data = null;
      try {
        const res = await fetch('/api/status');
        data = await res.json();
      } catch (e) {
        // Fallback if API not ready yet
      }

      // Wait for eye animation to complete
      await new Promise(r => setTimeout(r, 4500));

      // Discovery sequence — show real data
      const caps = data?.capabilities || [];
      const skills = caps.filter(c => c.kind === 'skill');
      const connectors = caps.filter(c => c.kind === 'connector');
      const channels = caps.filter(c => c.kind === 'channel');
      const ready = caps.filter(c => c.status === 'ready');
      const gaps = caps.filter(c => c.status !== 'ready');

      await addDiscoveryLine(`Scanning consciousness...`, 0);
      await addDiscoveryLine(`Identity loaded: <span class="count">Neo</span>, Modular AI Agent`, 800);
      await addDiscoveryLine(`Discovering capabilities...`, 1000);
      await addDiscoveryLine(`<span class="count">${skills.length}</span> skills discovered`, 800);
      await addDiscoveryLine(`<span class="count">${connectors.length}</span> connectors loaded (<span class="count">${connectors.filter(c => c.status === 'ready').length}</span> ready)`, 600);
      await addDiscoveryLine(`<span class="count">${channels.length}</span> channel active`, 600);

      if (gaps.length > 0) {
        await addDiscoveryLine(`<span class="count">${gaps.length}</span> capabilities pending — extensible`, 600);
      }

      // Model
      if (data?.model) {
        await addDiscoveryLine(`Model: <span class="count">${data.model}</span>`, 500);
      }

      // Ready
      await new Promise(r => setTimeout(r, 800));
      readyText.classList.add('visible');

      await new Promise(r => setTimeout(r, 600));
      enterBtn.classList.add('visible');

      // Mark awakening as complete
      try {
        await fetch('/api/awakened', { method: 'POST' });
      } catch (e) {}
    }

    function enterDashboard() {
      document.body.classList.add('fade-out');
      setTimeout(() => {
        window.location.href = '/dashboard';
      }, 800);
    }

    // Start the sequence
    runDiscovery();
  </script>
</body>
</html>
