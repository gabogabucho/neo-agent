<style>
.settings-sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--lumen-paper-2); border-right: 1px solid var(--lumen-line);
  display: flex; flex-direction: column; min-height: 100vh;
}
.settings-sidebar-head {
  padding: 20px; border-bottom: 1px solid var(--lumen-line);
}
.settings-sidebar-head h2 {
  font-size: 18px; font-weight: 700; margin-top: 12px;
}
.back-link {
  display: flex; align-items: center; gap: 6px;
  color: var(--lumen-mute); text-decoration: none; font-size: 13px;
}
.back-link:hover { color: var(--lumen-ink); }
.settings-nav { padding: 12px 0; }
.settings-nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; color: var(--lumen-ink-soft);
  text-decoration: none; font-size: 14px;
  border-left: 3px solid transparent;
  transition: all 0.15s;
}
.settings-nav-item:hover {
  background: rgba(0,0,0,0.03); color: var(--lumen-ink);
}
.settings-nav-item.active {
  background: rgba(0,0,0,0.04);
  color: var(--lumen-primary); font-weight: 500;
  border-left-color: var(--lumen-primary);
}
.settings-nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }

@media (max-width: 720px) {
  .settings-sidebar { width: 64px; min-height: auto; }
  .settings-sidebar-head { padding: 12px 8px; }
  .settings-sidebar-head h2 { display: none; }
  .settings-nav-item { padding: 10px; justify-content: center; }
  .settings-nav-item span { display: none; }
  .back-link span { display: none; }
}
</style>
