# Lumen Module Catalog — available modules that can be installed
# Lumen queries this when it detects a capability gap.
# Modules with tags [x-lumen, personality] define a Lumen identity — only one active at a time.

modules:
  - name: x-lumen-personal
    display_name: "Lumen Personal"
    description: "Asistente personal de uso general. Tareas, notas, búsquedas y lo que necesites."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    tags: [x-lumen, personality, personal]
    path: kits/x-lumen-personal

  - name: x-lumen-scholar
    display_name: "Scholar"
    description: "Tu compañero académico. Investiga, organiza y estudia más profundo."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    tags: [x-lumen, personality, personal, academic]
    path: kits/x-lumen-scholar

  - name: x-lumen-focus
    display_name: "Focus"
    description: "Productividad profunda. Pomodoro, planificación y gestión de energía."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    tags: [x-lumen, personality, personal, productivity]
    path: kits/x-lumen-focus

  - name: x-lumen-dev
    display_name: "Dev"
    description: "Tu pair programmer. Navega código, revisa PRs y depura con contexto real."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    tags: [x-lumen, personality, personal, developer]
    path: kits/x-lumen-dev

  - name: x-lumen-peluqueria
    display_name: "Peluquería"
    description: "Asistente completo para peluquerías y salones. Turnos, precios y atención al cliente."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    tags: [x-lumen, personality, vertical, negocio]
    path: kits/x-lumen-peluqueria

  - name: x-lumen-restaurant
    display_name: "Restaurant"
    description: "Asistente para restaurantes y bares. Reservas, menú, pedidos y delivery."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    tags: [x-lumen, personality, vertical, negocio]
    path: kits/x-lumen-restaurant

  - name: x-lumen-comunicacion-telegram
    display_name: "Telegram"
    description: "Canal de comunicación por Telegram para enviar mensajes y capturar updates entrantes."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    tags: [x-lumen, comunicacion, telegram]
    provides:
      - message.send_telegram
    path: modules/x-lumen-comunicacion-telegram

  - name: x-lumen-comunicacion-whatsapp
    display_name: "WhatsApp"
    description: "Canal de comunicación por WhatsApp Business Cloud API. Envío y recepción de mensajes."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    tags: [x-lumen, comunicacion, whatsapp]
    provides:
      - message.send_whatsapp
    path: modules/x-lumen-comunicacion-whatsapp

  - name: x-lumen-comunicacion-discord
    display_name: "Discord"
    description: "Canal de comunicación por Discord. Bot que escucha un canal y responde mensajes."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    tags: [x-lumen, comunicacion, discord]
    provides:
      - message.send_discord
    path: modules/x-lumen-comunicacion-discord

  - name: x-lumen-comunicacion-email
    display_name: "Email"
    description: "Canal de comunicación por email. Recibe vía IMAP y envía vía SMTP. Funciona con Gmail, Outlook y más."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    tags: [x-lumen, comunicacion, email]
    provides:
      - message.send_email
    path: modules/x-lumen-comunicacion-email


  - name: scheduler
    display_name: "Scheduler"
    description: "Schedule reminders and recurring tasks. Adds cron-like capabilities."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    min_capability: tier-2
    fills_gaps:
      - "reminder"
      - "schedule"
      - "cron"
      - "timer"
      - "alarm"
      - "recurring"
    provides:
      - scheduler.create
      - scheduler.list
      - scheduler.cancel
    requires:
      connectors: [task, memory]
    tags: [productivity, time, reminders]

  - name: web-search-provider
    display_name: "Web Search"
    description: "Search the web and extract content from URLs. Powers the web connector."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    min_capability: tier-2
    fills_gaps:
      - "web search"
      - "search the web"
      - "browse"
      - "internet"
      - "look up online"
      - "find online"
    provides:
      - web.search
      - web.extract
    tags: [web, search, internet]

  - name: file-manager
    display_name: "File Manager"
    description: "Read, write, and list local files. Powers the file connector."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    min_capability: tier-1
    fills_gaps:
      - "read file"
      - "write file"
      - "list files"
      - "open file"
      - "save file"
    provides:
      - file.read
      - file.write
      - file.list
    tags: [files, filesystem, storage]

  - name: peluqueria
    display_name: "Lumen Peluqueria"
    description: "Barbershop/salon assistant. Booking, pricing, cancellations via WhatsApp or web."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    min_capability: tier-2
    fills_gaps:
      - "appointment"
      - "booking"
      - "barbershop"
      - "salon"
      - "haircut"
      - "turno"
      - "peluqueria"
    provides:
      - calendar.check_availability
      - calendar.create
      - calendar.cancel
    requires:
      connectors: [task, memory, message]
    tags: [vertical, barbershop, booking]

  - name: restaurant
    display_name: "Lumen Restaurant"
    description: "Restaurant assistant. Menu, reservations, orders, and delivery management."
    version: "1.0.0"
    author: "Lumen Team"
    price: free
    min_capability: tier-2
    fills_gaps:
      - "reservation"
      - "restaurant"
      - "menu"
      - "order"
      - "table"
      - "delivery"
    provides:
      - menu.list
      - reservation.create
      - order.create
    requires:
      connectors: [task, memory, message]
    tags: [vertical, restaurant, food]
